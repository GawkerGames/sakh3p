<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sakh3p — добавить объект</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0e0d0c;
            color: #c5c0b8;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(20, 18, 16, 0.85);
            border: 1px solid #2f2a24;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .header {
            border-bottom: 2px solid #3d352e;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #d9c8b2;
            font-family: 'Courier New', monospace;
        }
        .logo .sub {
            font-size: 14px;
            color: #8a7e72;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
            border-bottom: 1px solid #1f1b17;
            padding-bottom: 10px;
        }
        .nav a {
            color: #b09b88;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 16px;
            border: 1px solid transparent;
            transition: 0.2s;
            border-radius: 4px;
        }
        .nav a:hover {
            background: #1f1b17;
            border-color: #5f4d3b;
            color: #e3d3c0;
        }
        .nav a.active {
            background: #1f1b17;
            border-color: #6f5a45;
            color: #e3d3c0;
        }
        .form-area {
            background: #11100d;
            border: 1px solid #2a2420;
            padding: 20px;
            border-radius: 6px;
        }
        .form-area label {
            display: block;
            color: #bfae9b;
            font-size: 14px;
            margin: 12px 0 4px 0;
            letter-spacing: 1px;
        }
        .form-area input, .form-area textarea {
            width: 100%;
            background: #1a1714;
            border: 1px solid #2f2a24;
            color: #c5c0b8;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-family: inherit;
        }
        .form-area input:focus, .form-area textarea:focus {
            border-color: #6f5a45;
            outline: none;
        }
        .form-area button {
            background: #2f261f;
            color: #dacbbd;
            border: 1px solid #4d3d30;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
        }
        .form-area button:hover {
            background: #4d3d30;
            border-color: #6f5a45;
        }
        .form-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #1f1b17;
            font-size: 13px;
            color: #4d443b;
            text-align: center;
        }
        .footer a {
            color: #8a7a68;
            text-decoration: none;
        }
        .hint {
            color: #6b6258;
            font-size: 13px;
            margin-top: 8px;
        }
        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            display: block;
            background: #1a2a1a;
            border: 1px solid #3a6a3a;
            color: #aad6aa;
        }
        .message.error {
            display: block;
            background: #2a1a1a;
            border: 1px solid #6a3a3a;
            color: #d6aaaa;
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .logo h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <div class="logo">
                <h1>➕ sakh3p</h1>
                <div class="sub">добавить объект</div>
            </div>
        </div>

        <div class="nav">
            <a href="index.html">🏠 главная</a>
            <a href="objects.html">📋 объекты</a>
            <a href="library.html">📚 библиотека</a>
            <a href="blog.html">📝 блоги</a>
            <a href="add.html" class="active">➕ добавить</a>
        </div>

        <div id="formMessage" class="message"></div>

        <div class="form-area">
            <form id="objectForm" method="POST" action="https://api.staticman.net/v2/entry/GawkerGames/sakh3p/main">
                <input type="hidden" name="options[redirect]" value="https://gawkergames.github.io/sakh3p/thanks.html">

                <label for="name">название объекта *</label>
                <input type="text" id="name" name="fields[name]" placeholder="например: заброшенный маяк" required>

                <label for="type">тип *</label>
                <input type="text" id="type" name="fields[type]" placeholder="завод / бункер / маяк / посёлок / больница / др." required>

                <label for="desc">описание *</label>
                <textarea id="desc" name="fields[desc]" rows="4" placeholder="краткое описание. БЕЗ КООРДИНАТ и точных адресов." required></textarea>

                <div class="hint">⚠️ координаты и точные адреса не публикуются — чтобы защитить места от вандалов.</div>

                <button type="submit" id="submitBtn">➕ отправить на модерацию</button>
            </form>
        </div>

        <div class="footer">
            <span style="color:#3d352e;">// sakh3p — архив заброшенных мест Сахалина //</span><br>
            <span style="font-size:11px;">сделано вручную · 2026 · <a href="https://github.com/GawkerGames/sakh3p" target="_blank">github</a></span>
        </div>

    </div>

    <script>
        const form = document.getElementById('objectForm');
        const messageEl = document.getElementById('formMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ отправка...';

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => { data[key] = value; });

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.fields && result.fields.name) {
                    messageEl.className = 'message success';
                    messageEl.innerHTML = '✅ объект отправлен на модерацию! он появится на сайте после проверки.';
                    form.reset();
                } else {
                    throw new Error(result.message || 'ошибка отправки');
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.innerHTML = '❌ ошибка: ' + error.message + '. попробуй ещё раз.';
            } finally {
                btn.disabled = false;
                btn.textContent = '➕ отправить на модерацию';
            }
        });
    </script>
</body>
</html>
